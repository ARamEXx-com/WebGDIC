<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GDIC Logistics | Fast & Reliable Shipping</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

  <!-- Navbar -->
  <nav class="bg-red-700 text-white p-5 flex justify-between items-center fixed w-full z-50 shadow-md">
    <h1 class="text-3xl font-bold">GDIC Logistics</h1>
    <div class="space-x-6 text-base">
      <a href="#" class="hover:underline">Home</a>
      <a href="#services" class="hover:underline">Services</a>
      <a href="#tracking" class="hover:underline">Track Shipment</a>
      <a onclick="showCargoProcess()" class="hover:underline cursor-pointer">Cargo Process</a>
      <button onclick="showLoginModal()" class="hover:underline">Login</button>
      <button onclick="showRegisterModal()" class="bg-white text-red-700 px-5 py-2 rounded-xl font-medium hover:scale-105 transition">Register</button>
      <button onclick="promptAdminAccess()" class="bg-white text-red-700 px-5 py-2 rounded-xl font-medium hover:scale-105 transition">Admin</button>
      <a href="#contact" class="hover:underline">Contact</a>
    </div>
  </nav>

  <!-- Hero, Services, Tracking, Contact, Footer remain the same as you had -->
  <!-- (I kept them exactly as in your code for brevity) -->

  <!-- Register Modal, Login Modal, Cargo Modal, Flight Modal remain the same -->

  <!-- Admin Access Modal -->
  <div id="adminAccessModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-[100]">
    <div class="bg-white rounded-3xl p-8 max-w-sm w-full mx-4">
      <h3 class="text-2xl font-bold mb-6 text-center">Admin Access</h3>
      <p class="text-center mb-4 text-gray-600">Enter Secret Code</p>
      <input type="password" id="adminCode" placeholder="Enter code" 
             class="w-full p-4 border rounded-2xl mb-6 text-center focus:outline-none focus:ring-2 focus:ring-red-600">
      <button onclick="checkAdminCode()" 
              class="w-full bg-red-700 text-white py-4 rounded-2xl font-bold mb-3">Access Registrations</button>
      <button onclick="hideAdminAccessModal()" class="w-full text-gray-500">Cancel</button>
    </div>
  </div>

  <!-- Registrations List Modal -->
  <div id="registrationsModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-[100]">
    <div class="bg-white rounded-3xl p-8 max-w-2xl w-full mx-4 max-h-[90vh] overflow-auto">
      <h3 class="text-3xl font-bold mb-6 text-center">Registered Users (Admin Only)</h3>
      <div id="registrationsList" class="space-y-4 text-sm"></div>
      <button onclick="hideRegistrationsModal()" class="mt-8 w-full bg-red-700 text-white py-4 rounded-2xl font-bold">Close</button>
    </div>
  </div>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();

    // Smooth scroll
    document.querySelectorAll('a[href^="#"]').forEach(link => {
      link.addEventListener('click', e => {
        if (link.getAttribute('href') !== '#') {
          e.preventDefault();
          document.querySelector(link.getAttribute('href')).scrollIntoView({ behavior: 'smooth' });
        }
      });
    });

    function trackPackage() {
      const input = document.getElementById("trackingInput").value.trim();
      const result = document.getElementById("trackingResult");

      if (!input) {
        alert("Please enter a tracking ID");
        return;
      }

      result.classList.remove("hidden");
      result.innerHTML = `✅ Redirecting to tracking page for <strong>${input}</strong>...`;

      setTimeout(() => {
        window.location.href = `https://aramexx-com.github.io/Trackingg/?trackingID=${encodeURIComponent(input)}`;
      }, 800);
    }

    // Modal Controls
    function showRegisterModal() { document.getElementById("registerModal").classList.remove("hidden"); }
    function hideRegisterModal() { document.getElementById("registerModal").classList.add("hidden"); }

    function showLoginModal() { document.getElementById("loginModal").classList.remove("hidden"); }
    function hideLoginModal() { document.getElementById("loginModal").classList.add("hidden"); }

    function showCargoProcess() { document.getElementById("cargoModal").classList.remove("hidden"); }
    function hideCargoModal() { document.getElementById("cargoModal").classList.add("hidden"); }

    function showFlightModal() { document.getElementById("flightModal").classList.remove("hidden"); }
    function hideFlightModal() { document.getElementById("flightModal").classList.add("hidden"); }

    // Admin Code Access
    function promptAdminAccess() {
      document.getElementById("adminAccessModal").classList.remove("hidden");
      document.getElementById("adminCode").value = "";
      document.getElementById("adminCode").focus();
    }

    function hideAdminAccessModal() {
      document.getElementById("adminAccessModal").classList.add("hidden");
    }

    function checkAdminCode() {
      const enteredCode = document.getElementById("adminCode").value.trim();
      
      if (enteredCode === "Legend419") {
        hideAdminAccessModal();
        showRegistrations();
      } else {
        alert("Incorrect code. Access denied.");
        document.getElementById("adminCode").value = "";
      }
    }

    // Show All Registrations
    function showRegistrations() {
      const users = JSON.parse(localStorage.getItem("gdicUsers")) || [];
      const listDiv = document.getElementById("registrationsList");
      listDiv.innerHTML = "";

      if (users.length === 0) {
        listDiv.innerHTML = "<p class='text-center text-gray-500 py-8'>No users have registered yet.</p>";
      } else {
        users.forEach((user, index) => {
          listDiv.innerHTML += `
            <div class="border p-5 rounded-2xl bg-gray-50">
              <div class="font-bold text-red-700">#${index + 1} - ${user.userId}</div>
              <div><strong>Name:</strong> ${user.name}</div>
              <div><strong>Email:</strong> ${user.email}</div>
              <div><strong>Phone:</strong> ${user.phone}</div>
            </div>`;
        });
      }
      document.getElementById("registrationsModal").classList.remove("hidden");
    }

    function hideRegistrationsModal() {
      document.getElementById("registrationsModal").classList.add("hidden");
    }

    // Register Function (100 users limit)
    function handleRegister(e) {
      e.preventDefault();

      const name = document.getElementById("regName").value.trim();
      const email = document.getElementById("regEmail").value.trim();
      const phone = document.getElementById("regPhone").value.trim();
      const password = document.getElementById("regPassword").value;

      let users = JSON.parse(localStorage.getItem("gdicUsers")) || [];

      if (users.length >= 100) {
        alert("Registration limit reached. Maximum 100 users allowed.");
        return;
      }

      if (users.some(u => u.email === email)) {
        alert("This email is already registered.");
        return;
      }

      const userId = `GDIC${String(users.length + 1).padStart(3, '0')}`;

      users.push({ userId, name, email, phone, password });
      localStorage.setItem("gdicUsers", JSON.stringify(users));

      alert(`✅ Registration Successful!\n\nYour Unique User ID is: ${userId}\n\nPlease keep this ID safe.`);

      hideRegisterModal();
      document.getElementById("registerForm").reset();
    }

    // Login Function
    function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value;

      const users = JSON.parse(localStorage.getItem("gdicUsers")) || [];
      const user = users.find(u => u.email === email && u.password === password);

      if (user) {
        alert(`Login Successful!\nWelcome, ${user.name}!\nYour User ID: ${user.userId}`);
        hideLoginModal();
        document.getElementById("loginForm").reset();
      } else {
        alert("Invalid email or password.");
      }
    }

    // Enter key support
    document.getElementById("trackingInput").addEventListener("keypress", e => {
      if (e.key === "Enter") trackPackage();
    });
  </script>
</body>
</html>
